site_name: light-curve
site_url: https://light-curve.snad.space/
repo_url: https://github.com/light-curve/light-curve-python
repo_name: light-curve/light-curve-python
edit_uri: edit/documentation/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          load_external_modules: true
          options:
            docstring_style: numpy
            show_source: false
            show_bases: true
            show_signature_annotations: false
            show_root_heading: true
            heading_level: 3
            force_inspection: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - CHANGELOG.md
  - light-curve/light_curve

nav:
  - Home: index.md
  - Installation: installation.md
  - Features:
    - Overview: features/index.md
    - Basics: features/basics.ipynb
    - Periodogram: features/periodogram.ipynb
    - Parametric fits: features/fitting.ipynb
    - API reference: features/api.md
  - Embeddings:
    - Overview: embed/index.md
    - Tutorial: embed/tutorial.ipynb
    - API reference: embed/api.md
  - dm-dt maps:
    - Overview: dmdt/index.md
    - Tutorial: dmdt/tutorial.ipynb
    - API reference: dmdt/api.md
  - Developer:
    - Contributing: developer/contributing.md
    - Changelog: developer/changelog.md
