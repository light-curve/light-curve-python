site_name: light-curve
site_url: https://light-curve.snad.space/
repo_url: https://github.com/light-curve/light-curve-python
repo_name: light-curve/light-curve-python
edit_uri: edit/documentation/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - header.autohide

extra:
  generator: false

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          load_external_modules: true
          options:
            docstring_style: numpy
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false
              warnings: false
            filters:
              - "!^_"
            show_source: false
            show_bases: true
            show_signature: false
            show_root_heading: true
            heading_level: 3
            force_inspection: true
            inherited_members: false
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - CHANGELOG.md
  - light-curve/light_curve

nav:
  - Home: index.md
  - Installation: installation.md
  - Hand-Crafted Features:
    - features/index.md
    - Basics: features/basics.ipynb
    - Periodogram: features/periodogram.ipynb
    - Parametric fits: features/fitting.ipynb
    - API:
      - Meta (Extractor, Bins): features/api/meta.md
      - Statistical: features/api/statistical.md
      - Variability & trend: features/api/variability.md
      - Time sampling: features/api/time.md
      - Periodogram: features/api/periodogram.md
      - Parametric fits: features/api/fitting.md
      - Detection-based: features/api/detection.md
      - Multiband: features/api/multiband.md
  - ML Embeddings:
    - embed/index.md
    - Tutorial: embed/tutorial.ipynb
    - API reference: embed/api.md
  - dm–dt maps:
    - dmdt/index.md
    - Tutorial: dmdt/tutorial.ipynb
    - API reference: dmdt/api.md
  - Changelog: changelog.md
  - Developer:
    - Contributing: developer/contributing.md
