name: Docs Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Intentionally no write permissions — this job runs PR code from forks.
# The deploy step lives in docs-preview-deploy.yml (workflow_run trigger)
# which runs in the base repo context and has write access.

jobs:
  docs-preview-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "light-curve"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev

      - name: Install from source with docs dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd light-curve && maturin develop --extras=full --group=docs -q

      - name: Build docs
        run: |
          source .venv/bin/activate
          mkdocs build --site-dir /tmp/pr-site

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > /tmp/pr-site/pr_number.txt

      - name: Upload docs preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: /tmp/pr-site/
          retention-days: 7
