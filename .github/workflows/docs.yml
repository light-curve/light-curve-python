name: Docs

on:
  push:
    branches:
      - documentation
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "light-curve"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install from source with docs dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd light-curve && maturin develop --extras=full --group=docs -q

      - name: Deploy dev (documentation branch)
        if: github.ref_type == 'branch'
        run: |
          source .venv/bin/activate
          mike deploy --push --update-aliases dev
          mike list | grep -q "latest" || mike set-default --push dev

      - name: Deploy release (tag)
        if: github.ref_type == 'tag'
        run: |
          source .venv/bin/activate
          mike deploy --push --update-aliases latest
          mike set-default --push latest
