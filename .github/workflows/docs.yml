name: Docs

on:
  push:
    branches:
      - documentation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install light-curve (pre-built wheel)
        run: pip install 'light-curve[full]'

      - name: Install docs dependencies
        run: pip install mkdocs-material "mkdocstrings[python]" numpy

      - name: Build and deploy
        run: mkdocs gh-deploy --force
