name: Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

# All jobs push to gh-pages; queue them, never cancel
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "light-curve"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install from source with docs dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd light-curve && maturin develop --extras=full --group=docs -q

      - name: Deploy dev (main branch)
        if: github.ref_type == 'branch'
        run: |
          source .venv/bin/activate
          mike deploy --push --update-aliases dev
          mike list | grep -q "latest" || mike set-default --push dev

      - name: Deploy release (tag)
        if: github.ref_type == 'tag'
        run: |
          source .venv/bin/activate
          mike deploy --push --update-aliases latest
          mike set-default --push latest

  preview:
    # Build from source and push directly to gh-pages/pr{N}/ without touching
    # versions.json, so the version switcher stays clean.
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-deploy
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "light-curve"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install from source with docs dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd light-curve && maturin develop --extras=full --group=docs -q

      - name: Build docs
        run: |
          source .venv/bin/activate
          mkdocs build --site-dir /tmp/pr-site

      - name: Push preview to gh-pages
        run: |
          PR=${{ github.event.pull_request.number }}
          rm -rf gh-pages-deploy/pr${PR}
          cp -r /tmp/pr-site gh-pages-deploy/pr${PR}
          cd gh-pages-deploy
          git add pr${PR}
          git diff --cached --quiet && echo "No changes" || git commit -m "docs: update PR #${PR} preview"
          git push

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- docs-preview -->';
            const url = `https://light-curve.snad.space/pr${{ github.event.pull_request.number }}/`;
            const body = `${marker}\n📖 **Docs preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete PR preview
        run: |
          PR=${{ github.event.pull_request.number }}
          if [ -d pr${PR} ]; then
            git rm -rf pr${PR}
            git commit -m "docs: remove PR #${PR} preview"
            git push
          fi
