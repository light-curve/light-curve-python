name: Test

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 2"
  workflow_dispatch:

concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && github.run_id || github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-wheel-linux-x86_64:
    name: Build wheels (x86_64)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}-${{ runner.arch }}_stable-rust_build-wheels"
          workspaces: "light-curve"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build abi3 wheel
        run: uvx maturin build --release -i python3.14
      - name: Upload abi3 wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: light-curve/target/wheels/
      - name: Set up Python 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Build free-threading wheel
        run: |
          rm -f target/wheels/*.whl
          uvx maturin build --release -i python3.14t
      - name: Upload free-threading wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64-ft
          path: light-curve/target/wheels/


  build-wheel-linux-aarch64:
    name: Build wheels (aarch64)
    runs-on: ubuntu-24.04-arm

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}-${{ runner.arch }}_stable-rust_build-wheels"
          workspaces: "light-curve"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build abi3 wheel
        run: uvx maturin build --release -i python3.14
      - name: Upload abi3 wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: light-curve/target/wheels/


  prepare-hf-models:
    runs-on: ubuntu-24.04-arm
    needs: [build-wheel-linux-aarch64]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Restore HuggingFace cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux-aarch64
          path: light-curve/wheels/
      - name: Run embed tests (populates HF cache)
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install wheels/*.whl --group test
          pytest tests/embed/
      - name: Save HuggingFace cache
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}


  test-linux-x86_64:
    runs-on: ubuntu-latest
    needs: [build-wheel-linux-x86_64, prepare-hf-models]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - {python_minor: "10", wheel_artifact: wheels-linux-x86_64}
          - {python_minor: "14t", wheel_artifact: wheels-linux-x86_64-ft}

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.${{ matrix.python_minor }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.${{ matrix.python_minor }}"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        id: hf-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Set HF offline mode
        if: steps.hf-cache.outputs.cache-hit == 'true'
        run: echo "HF_HUB_OFFLINE=1" >> $GITHUB_ENV
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.wheel_artifact }}
          path: light-curve/wheels/
      - name: Run tests
        run: uvx --with tox-uv tox -e py3${{ matrix.python_minor }}-test --installpkg=$(ls wheels/*.whl)


  test-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    needs: [build-wheel-linux-aarch64, prepare-hf-models]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        python_minor: ["11", "12", "13", "14"]

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.${{ matrix.python_minor }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.${{ matrix.python_minor }}"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        id: hf-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Set HF offline mode
        if: steps.hf-cache.outputs.cache-hit == 'true'
        run: echo "HF_HUB_OFFLINE=1" >> $GITHUB_ENV
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux-aarch64
          path: light-curve/wheels/
      - name: Run tests
        run: uvx --with tox-uv tox -e py3${{ matrix.python_minor }}-test --installpkg=$(ls wheels/*.whl)


  ruff:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .
        working-directory: light-curve


  cargo-fmt:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --manifest-path=light-curve/Cargo.toml -- --check


  cargo-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_stable-rust_cargo-clippy"
          workspaces: "light-curve"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - run: cargo clippy --manifest-path=light-curve/Cargo.toml --all-targets -- -D warnings


  coverage:
    runs-on: ubuntu-latest
    needs: [prepare-hf-models]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_stable-rust_maturin-develop"
          workspaces: "light-curve"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Cache HuggingFace models
        id: hf-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Set HF offline mode
        if: steps.hf-cache.outputs.cache-hit == 'true'
        run: echo "HF_HUB_OFFLINE=1" >> $GITHUB_ENV
      - name: Generate code coverage
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin
          maturin develop --group dev
          pytest
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != '' || github.repository == 'light-curve/light-curve-python'
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true


  benchmarks:
    runs-on: ubuntu-latest
    needs: [build-wheel-linux-x86_64, prepare-hf-models]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CODSPEED_TOKEN: ${{ secrets.CODSPEED_TOKEN }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        id: hf-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Set HF offline mode
        if: steps.hf-cache.outputs.cache-hit == 'true'
        run: echo "HF_HUB_OFFLINE=1" >> $GITHUB_ENV
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux-x86_64
          path: wheels/
      - name: Check CodSpeed token
        if: github.repository == 'light-curve/light-curve-python' && env.CODSPEED_TOKEN == ''
        run: |
          echo "::error::CODSPEED_TOKEN secret is missing or expired — please renew it."
          exit 1
      - name: Run benchmarks
        if: env.CODSPEED_TOKEN != ''
        uses: CodSpeedHQ/action@v4
        with:
          token: ${{ env.CODSPEED_TOKEN }}
          mode: simulation
          run: |
            cd light-curve
            uv venv --python=python3.13 .venv
            source .venv/bin/activate
            uv pip install ../wheels/*.whl
            uv pip install --group test pytest-codspeed
            pytest -m "not (nobs or multi)" --codspeed tests/test_w_bench.py


  msrv-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Set up Python 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
      - name: Get minimum supported Rust version
        run: echo "msrv=$(grep '^rust-version = ' Cargo.toml | grep -o '[0-9.]\+')" >> $GITHUB_OUTPUT
        id: get_msrv
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.get_msrv.outputs.msrv }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_msrv-rust_maturin-build"
          workspaces: "light-curve"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Build
        run: |
          uvx maturin build -i python3.10
          uvx maturin build -i python3.14t


  slow-tests:
    runs-on: ubuntu-latest
    needs: [build-wheel-linux-x86_64, prepare-hf-models]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux-x86_64
          path: light-curve/wheels/
      - name: Cache HuggingFace models
        id: hf-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: huggingface-v1-${{ github.run_id }}
          restore-keys: huggingface-v1
      - name: Set HF offline mode
        if: steps.hf-cache.outputs.cache-hit == 'true'
        run: echo "HF_HUB_OFFLINE=1" >> $GITHUB_ENV
      - name: Run slow tests
        working-directory: light-curve
        run: uvx --with tox-uv tox -e py314-slow --installpkg=$(ls wheels/*.whl)
