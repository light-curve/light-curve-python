name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && github.run_id || github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}-${{ runner.arch }}_stable-rust_build-wheels"
          workspaces: "light-curve"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build abi3 wheel
        run: uvx maturin build --release -i python3.14 --auditwheel=repair
      - name: Upload abi3 wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: light-curve/target/wheels/
      # Free-threading builds: x86_64 only for now
      - name: Set up Python 3.14t
        if: matrix.arch == 'x86_64'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Build free-threading wheel
        if: matrix.arch == 'x86_64'
        run: |
          rm -f target/wheels/*.whl
          uvx maturin build --release -i python3.14t --auditwheel=repair
      - name: Upload free-threading wheel
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-ft
          path: light-curve/target/wheels/


  test:
    runs-on: ${{ matrix.os }}
    needs: [build-wheels]

    strategy:
      fail-fast: false
      matrix:
        include:
          - {python_minor: "10", os: ubuntu-latest, wheel_artifact: wheels-linux-x86_64}
          - {python_minor: "11", os: ubuntu-latest, wheel_artifact: wheels-linux-x86_64}
          - {python_minor: "12", os: ubuntu-latest, wheel_artifact: wheels-linux-x86_64}
          - {python_minor: "14", os: ubuntu-latest, wheel_artifact: wheels-linux-x86_64}
          - {python_minor: "14t", os: ubuntu-latest, wheel_artifact: wheels-linux-x86_64-ft}
          - {python_minor: "13", os: ubuntu-24.04-arm, wheel_artifact: wheels-linux-aarch64}

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.${{ matrix.python_minor }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.${{ matrix.python_minor }}"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.wheel_artifact }}
          path: light-curve/wheels/
      - name: Run tests
        run: uvx --with tox-uv tox -e py3${{ matrix.python_minor }}-test --installpkg=$(ls wheels/*.whl)


  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .
        working-directory: light-curve


  cargo-fmt:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --manifest-path=light-curve/Cargo.toml -- --check


  cargo-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_stable-rust_cargo-clippy"
          workspaces: "light-curve"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - run: cargo clippy --manifest-path=light-curve/Cargo.toml --all-targets -- -D warnings


  coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_stable-rust_maturin-develop"
          workspaces: "light-curve"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Generate code coverage
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin
          maturin develop --group dev
          python -m pytest
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


  benchmarks:
    runs-on: ubuntu-latest
    needs: [build-wheels]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheels/
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          mode: simulation
          run: |
            cd light-curve
            uv venv --python=python3.13 .venv
            source .venv/bin/activate
            uv pip install ../wheels/*.whl
            uv pip install --group test pytest-codspeed
            python -m pytest -m "not (nobs or multi)" --codspeed tests/test_w_bench.py


  msrv-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: light-curve

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Set up Python 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
      - name: Get minimum supported Rust version
        run: echo "msrv=$(grep '^rust-version = ' Cargo.toml | grep -o '[0-9.]\+')" >> $GITHUB_OUTPUT
        id: get_msrv
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.get_msrv.outputs.msrv }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}_msrv-rust_maturin-build"
          workspaces: "light-curve"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Build
        run: |
          uvx maturin build -i python3.10
          uvx maturin build -i python3.14t
